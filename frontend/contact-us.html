<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - [Your Website Name]</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="workbook.css">
    <link rel="stylesheet" href="footer-style.css">
    <style>
        .contact-wrap { padding: 60px 20px; background-color: var(--c-bg-light); min-height: 70vh; display: flex; align-items: center; justify-content: center; }
        .contact-card { max-width: 500px; width: 100%; background: var(--c-white); padding: 40px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .contact-card h1 { color: var(--c-dark); text-align: center; margin-bottom: 10px; }
        .contact-card p.subtitle { text-align: center; color: var(--c-text-gray); font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--c-dark); }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Poppins', sans-serif; font-size: 14px; }
        textarea { min-height: 120px; resize: vertical; }
        .btn-submit { width: 100%; padding: 12px; background-color: var(--c-action); color: var(--c-white); border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn-submit:hover { background-color: var(--c-action-hover); }
        .info { text-align: center; margin-top: 30px; font-size: 14px; color: var(--c-text-gray); border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="contact-wrap">
        <div class="contact-card">
            <h1>Get in Touch</h1>
            <p class="subtitle">Have a question? We're here to help!</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Your Message</label>
                    <textarea name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>

            <div class="info">
                <p>Email: <strong>support@yourwebsite.com</strong></p>
                <p><a href="workbook.html" style="color: var(--c-accent); text-decoration: none;">&larr; Back to Home</a></p>
            </div>
        </div>
    </div>
</body>
</html>
